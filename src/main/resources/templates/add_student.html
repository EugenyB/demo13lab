<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новий студент</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<nav>
    <a th:href="@{/}">Home</a>
    <a th:href="@{/add}">Додавання</a>
    <a th:href="@{/rating}">Рейтинг</a>
    <a th:href="@{/about}">Про програму</a>
</nav>
<div class="content">
    <h1>Додавання студента</h1>
    <form method="post" th:action="@{/add}">
        <div class="form-group">
            <label for="name">Ім'я:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="age">Вік</label>
            <input type="number" id="age" name="age" required>
        </div>
        <div class="form-group">
            <label for="rating">Рейтинг</label>
            <input type="number" id="rating" name="rating" step="0.01" min="0" max="100" required>
        </div>
        <button type="submit" class="btn-submit">Додати</button>
        <a class="btn-cancel" th:href="@{/}">Скасувати</a>
    </form>
</div>
</body>
</html>
